<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Halalisani Ngema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:#080810; --bg2:#0f0f1a; --bg3:#13131f;
      --gold:#c9a84c; --gold-lt:#e0c47a; --gold-dim:#7d6630;
      --cream:#f5efe0; --text:#e8e0d0; --text-muted:#8a8070;
      --border:rgba(201,168,76,0.18);
      --ff-serif:'Cormorant Garamond',Georgia,serif;
      --ff-sans:'Outfit',sans-serif;
      --ff-mono:'DM Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--ff-sans);font-size:16px;line-height:1.7;overflow-x:hidden;}
    a{color:inherit;text-decoration:none;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 4rem;background:linear-gradient(to bottom,rgba(8,8,16,.95) 0%,transparent 100%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid transparent;transition:border-color .4s,background .4s;}
    nav.scrolled{border-color:var(--border);background:rgba(8,8,16,.96);}
    .nav-logo-btn{display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .3s,transform .25s;}
    .nav-logo-btn:hover{opacity:.82;transform:scale(1.07);}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-size:.78rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);transition:color .3s;position:relative;}
    .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .35s ease;}
    .nav-links a:hover{color:var(--gold-lt);}
    .nav-links a:hover::after{transform:scaleX(1);}
    .nav-back{font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.55rem 1.4rem;border:1px solid var(--gold-dim);color:var(--gold);border-radius:2px;transition:background .3s,color .3s;}
    .nav-back:hover{background:var(--gold);color:var(--bg);}
    .nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
    .nav-hamburger span{display:block;width:24px;height:1.5px;background:var(--gold);}

    /* MOBILE NAV */
    .mobile-nav{position:fixed;inset:0;background:rgba(8,8,16,.98);z-index:950;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;opacity:0;pointer-events:none;transition:opacity .35s;}
    .mobile-nav.open{opacity:1;pointer-events:all;}
    .mobile-nav a{font-size:1.5rem;font-family:var(--ff-serif);color:var(--text);transition:color .25s;}
    .mobile-nav a:hover{color:var(--gold);}
    .mobile-nav-close{position:absolute;top:1.5rem;right:2rem;background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer;}

    /* ARTICLE */
    .article-wrap{max-width:720px;margin:0 auto;padding:8rem 2rem 6rem;}
    .article-back{display:inline-flex;align-items:center;gap:.5rem;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:3rem;transition:color .25s;}
    .article-back:hover{color:var(--gold);}
    .article-back svg{transition:transform .25s;}
    .article-back:hover svg{transform:translateX(-3px);}
    .article-meta{margin-bottom:2.5rem;}
    .article-date{font-family:var(--ff-mono);font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;}
    .article-title{font-family:var(--ff-serif);font-size:clamp(2rem,5vw,3rem);font-weight:600;color:var(--cream);line-height:1.15;margin-bottom:1rem;}
    .article-tags{display:flex;flex-wrap:wrap;gap:.4rem;}
    .article-tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);border:1px solid rgba(201,168,76,.15);padding:.15rem .5rem;border-radius:2px;}
    .article-divider{width:40px;height:1px;background:var(--gold-dim);margin:2rem 0;}

    /* MARKDOWN CONTENT */
    .article-body{font-size:1rem;line-height:1.8;color:var(--text);}
    .article-body h1,.article-body h2,.article-body h3{font-family:var(--ff-serif);color:var(--cream);line-height:1.2;margin:2.5rem 0 1rem;}
    .article-body h1{font-size:1.9rem;}
    .article-body h2{font-size:1.5rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;}
    .article-body h3{font-size:1.2rem;color:var(--gold-lt);}
    .article-body p{margin-bottom:1.25rem;}
    .article-body strong{color:var(--cream);font-weight:600;}
    .article-body em{color:var(--gold-lt);font-style:italic;}
    .article-body a{color:var(--gold);border-bottom:1px solid rgba(201,168,76,.3);transition:border-color .25s;}
    .article-body a:hover{border-color:var(--gold);}
    .article-body ul,.article-body ol{margin:0 0 1.25rem 1.5rem;}
    .article-body li{margin-bottom:.4rem;}
    .article-body blockquote{border-left:3px solid var(--gold-dim);padding:.75rem 1.25rem;margin:1.5rem 0;color:var(--text-muted);font-style:italic;background:var(--bg2);}
    .article-body code{font-family:var(--ff-mono);font-size:.85em;background:var(--bg3);padding:.15em .4em;border-radius:3px;color:var(--gold-lt);}
    .article-body pre{background:var(--bg3);border:1px solid var(--border);padding:1.25rem;border-radius:4px;overflow-x:auto;margin-bottom:1.25rem;}
    .article-body pre code{background:none;padding:0;}
    .article-body hr{border:none;border-top:1px solid var(--border);margin:2rem 0;}
    .article-body img{border-radius:4px;margin:1.5rem 0;max-width:100%;}

    /* FOOTER */
    footer{padding:3rem 0;text-align:center;border-top:1px solid var(--border);}
    .footer-brand{font-family:var(--ff-serif);font-size:1.1rem;color:var(--gold);margin-bottom:.5rem;}
    .footer-copy{font-size:.75rem;color:var(--text-muted);}

    /* LOADING / ERROR */
    .state-msg{text-align:center;padding:6rem 2rem;color:var(--text-muted);}

    @media(max-width:768px){
      nav{padding:1.2rem 1.5rem;}
      .nav-links{display:none;}
      .nav-hamburger{display:flex;}
    }
  </style>
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo-btn" title="Home">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18.5" stroke="#c9a84c" stroke-width="1.4" fill="#080810"/>
        <text x="20" y="25.5" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="14" font-weight="600" fill="#c9a84c" letter-spacing="1.5">HN</text>
        <circle cx="20" cy="20" r="15" stroke="rgba(201,168,76,0.15)" stroke-width="0.8" fill="none"/>
      </svg>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="blog.html">Blog</a></li>
    </ul>
    <a href="blog.html" class="nav-back">← All Posts</a>
    <div class="nav-hamburger" id="hamburger" onclick="toggleMobileNav()">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-close" onclick="toggleMobileNav()">✕</button>
    <a href="index.html" onclick="toggleMobileNav()">Home</a>
    <a href="blog.html" onclick="toggleMobileNav()">All Posts</a>
    <a href="index.html#contact" onclick="toggleMobileNav()">Contact</a>
  </div>

  <div id="articleContainer" class="state-msg">Loading post…</div>

  <footer>
    <div class="footer-brand">Halalisani Ngema</div>
    <div class="footer-copy">&copy; 2026 &nbsp;&middot;&nbsp; Johannesburg, South Africa</div>
  </footer>

  <script>
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 60));
    function toggleMobileNav() { document.getElementById('mobileNav').classList.toggle('open'); }

    function parseFrontmatter(text) {
      const fm = {};
      if (!text.startsWith('---')) return { fm, body: text };
      const end = text.indexOf('---', 3);
      if (end === -1) return { fm, body: text };
      const block = text.slice(3, end).trim();
      let body = text.slice(end + 3).trim();
      block.split('\n').forEach(line => {
        const colon = line.indexOf(':');
        if (colon === -1) return;
        const key = line.slice(0, colon).trim();
        const val = line.slice(colon + 1).trim();
        if (key === 'tags') fm.tags = val.split(',').map(t => t.trim());
        else fm[key] = val;
      });
      return { fm, body };
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('articleContainer').innerHTML =
        '<div class="state-msg">No post specified. <a href="blog.html" style="color:var(--gold)">← Back to blog</a></div>';
    } else {
      fetch(`posts/${id}.md`)
        .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
        .then(text => {
          const { fm, body } = parseFrontmatter(text);
          document.title = `${fm.title || 'Post'} — Halalisani Ngema`;
          const html = marked.parse(body);
          document.getElementById('articleContainer').outerHTML = `
            <article class="article-wrap">
              <a href="blog.html" class="article-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                All Posts
              </a>
              <div class="article-meta">
                <div class="article-date">${fm.date || ''}</div>
                <h1 class="article-title">${fm.title || ''}</h1>
                <div class="article-tags">${(fm.tags||[]).map(t=>`<span class="article-tag">${t}</span>`).join('')}</div>
              </div>
              <div class="article-divider"></div>
              <div class="article-body">${html}</div>
            </article>
          `;
        })
        .catch(() => {
          document.getElementById('articleContainer').innerHTML =
            '<div class="state-msg">Post not found. <a href="blog.html" style="color:var(--gold)">← Back to blog</a></div>';
        });
    }
  </script>
</body>
</html>
